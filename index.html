<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>🎵 本日の40歌</title>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  
  <style>
    body{
      margin:0;
      background:#faf7ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:sans-serif;
      text-align:center;
    }

    .box{
      padding:40px;
    }

    h1{
      font-size:2.2em;
      margin-bottom:15px;
    }

    p{
      font-size:1.1em;
      color:#666;
      margin-bottom:30px;
    }

    button{
      font-size:1.2em;
      padding:15px 35px;
      border:none;
      border-radius:12px;
      cursor:pointer;
    }

#loading{
  position: relative;
  overflow: hidden;
}

#snow-area {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 9999;
}

.flake {
  position: absolute;
  top: -30px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}

#chara {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 10000;
}

#chara-inner {
  display: inline-block;
}

#chara img {
  width: 200px;
  display: block;
}

@media (max-width: 768px) {
  #chara img {
    width: 110px;
  }
}
    
    #loading{
      display:none;
      font-size:1.3em;
      margin-top:20px;
    }

.box{
  padding:40px;
  width:100%;
  max-width:1000px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
}

/* 左 */
.left{
  flex:1;
  text-align:left;
}

/* 右（イラスト） */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

#main-illust{
  width:280px;
  max-width:100%;
}

@media (max-width: 768px) {
  .top{
    flex-direction:column;
    text-align:center;
  }

  .left{
    text-align:center;
  }

  #main-illust{
    width:200px;
  }
}

.left h1{
  font-size:3em;
  margin-bottom:20px;
}

.left p{
  font-size:1.3em;
  line-height:1.6;
}

#progress{
  font-size:1.2em;
  margin-top:15px;
}

.left button{
  font-size:1.4em;
  padding:18px 45px;
}

#main-illust{
  width:380px; /* 280 → 380 */
  max-width:100%;
} 

 .top{
  gap:60px; /* 40 → 60 */
}   

@media (max-width: 768px) {
  .left h1{
    font-size:2.2em;
  }

  .left p{
    font-size:1.1em;
  }

  #progress{
    font-size:1em;
  }
}

@media (max-width: 768px) {
  #main-illust{
    width:160px;
  }
}    

.left{
  min-height:320px;
}

.right{
  align-self:center;
}    

body{
  font-family: "DotGothic16", sans-serif;
}

button{
  font-family: "DotGothic16", sans-serif;
}

.left h1,
.left p,
.left #progress,
.left button {
  text-align: center;
}

.left button{
  display: inline-block;
  margin: 0 auto;
}    

.left button{
  display: block;
  margin: 20px auto 0 auto;
}

.left button{
  display: block;
  margin: 20px auto 0 auto;

  font-family: "DotGothic16", sans-serif;

  font-size: 1.3em;
  padding: 16px 40px;

  color: #ffffff;
  background: linear-gradient(180deg, #4aa3ff, #1d5cff);

  border: 3px solid #0b2f7a;
  border-radius: 10px;

  box-shadow: 0 6px 0 #0b2f7a;

  cursor: pointer;
  transition: 0.1s;
}

.left button:active{
  transform: translateY(4px);
  box-shadow: 0 2px 0 #0b2f7a;
}    

.left button{
  text-shadow: 0 0 6px rgba(255,255,255,0.6);
}

#loading{
  text-align: center;
  margin-top: 20px;
  width: 100%;
}
    
  </style>
</head>

  
<body>

<div id="snow-area"></div> 
  
<div class="box">

  <div class="top">
    
    <div class="left">
      <h1>🧊 本日の40歌 🎶</h1>

      <p>ボタンを押して今日の一曲を聴こう！</p>

      <p id="progress">
        今日は 0 / 27 曲 聴いたよ♪
      </p>

      <button onclick="go()"> 今日の一曲を選ぶ</button>

      <div id="loading" style="display:none;">
        選曲中... 🎵
      </div>
    </div>

    <div class="right">
      <img src="cara1.png" id="main-illust">
    </div>

  </div>

  <div id="song-area">
    <div id="message"></div>
  </div>

</div>

  
<script>

const shorts = [
"https://youtube.com/shorts/77hRgNT0Hmo",
"https://youtube.com/shorts/RpKVfrWMneY",
"https://youtube.com/shorts/HkVHkRpf0fw",
"https://youtube.com/shorts/Qx-xw7kbkzo",
"https://youtube.com/shorts/EZw6ueP94u0",
"https://youtube.com/shorts/k_UWZtZ-rX0",
"https://youtube.com/shorts/8128sEHfsY8",
"https://youtube.com/shorts/OnZdwk4R4So",
"https://youtube.com/shorts/0CQ7bdr8r1c",
"https://youtube.com/shorts/Kg8neCbN8Js",
"https://youtube.com/shorts/Kq40qkyYMUI",
"https://youtube.com/shorts/4BcZ-pd1jQY",
"https://youtube.com/shorts/urQm5sQ6O5U",
"https://youtube.com/shorts/HeKQwgo7ohU",
"https://youtube.com/shorts/h-zyqa_czBI",
"https://youtube.com/shorts/JRQaDIx3tlA",
"https://youtube.com/shorts/_UpUKuet4CU",
"https://youtube.com/shorts/1-iPDNokLdU",
"https://youtube.com/shorts/iIGouQnJ5J4",
"https://youtube.com/shorts/F41j0wLYxzU",
"https://youtube.com/shorts/GSavwTeP4LE",
"https://youtube.com/shorts/oyOzGBOIshk",
"https://youtube.com/shorts/dYNGoqxzCy8",
"https://youtube.com/shorts/oE47Am1n93E",
"https://youtube.com/shorts/9RyojaXw2AU",
"https://youtu.be/STJBZ_BmUlc",
"https://youtu.be/h0dNmRwOpj0"
];

function shuffle(array) {
  const result = [...array];

  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }

  return result;
}

function getToday() {
  return new Date().toLocaleDateString("ja-JP");
}

function createNewPlaylist() {
  const playlist = {
    date: getToday(),
    order: shuffle([...Array(shorts.length).keys()]),
    index: 0
  };

  localStorage.setItem("playlist", JSON.stringify(playlist));

  return playlist;
}

function getPlaylist() {
  const saved = localStorage.getItem("playlist");

  if (!saved) {
    return createNewPlaylist();
  }

  const playlist = JSON.parse(saved);

  if (playlist.date !== getToday()) {
    return createNewPlaylist();
  }

  return playlist;
}

function savePlaylist(playlist) {
  localStorage.setItem("playlist", JSON.stringify(playlist));
}

function updateProgress() {
  const playlist = getPlaylist();

  document.getElementById("progress").textContent =
    `今日は ${playlist.index} / ${shorts.length} 曲 聴いたよ♪`;
}

function showSnow() {

  const area = document.getElementById("snow-area");

  area.innerHTML = "";

  const icons = ["🧊", "🎶"];

  const isMobile = window.innerWidth < 768;
const count = isMobile ? 40 : 70;

for (let i = 0; i < count; i++) {

  const flake = document.createElement("div");

  flake.className = "flake";

  flake.textContent = icons[Math.floor(Math.random() * icons.length)];

  // 横位置（まばら）
  const margin = window.innerWidth * 0.1;
  flake.style.left =
    (Math.random() * (window.innerWidth + margin * 2) - margin) + "px";

  // サイズ（まばら）
  flake.style.opacity = 0.2 + Math.random() * 0.5;
  flake.style.fontSize = (30 + Math.random() * 30) + "px";
　if (isMobile) {
  flake.style.fontSize = (18 + Math.random() * 25) + "px";
}
  
  // 落下速度
 flake.style.animationDuration =
  (isMobile ? (1.2 + Math.random() * 0.8)
             : (0.8 + Math.random() * 0.6)) + "s";
  
  // 出現タイミングズレ
  flake.style.animationDelay = (Math.random() * 0.3) + "s";

  area.appendChild(flake);
}

}
  
function go() {

  document.querySelector("button").style.display = "none";
  document.getElementById("loading").style.display = "block";

  showSnow();

  setTimeout(() => {

    const playlist = getPlaylist();

    if (playlist.index >= playlist.order.length) {
  playlist.index = 0;
  playlist.order = shuffle([...Array(shorts.length).keys()]);

  savePlaylist(playlist);

  alert("🎉 全部聴き終わったよ！\n\n新しくシャッフルするね♪");
}
    
    const songIndex = playlist.order[playlist.index];

    playlist.index++;

    savePlaylist(playlist);

    location.href = shorts[songIndex];

  }, 1000);

}

updateProgress();

const inner = document.getElementById("chara-inner");
const img = document.getElementById("chara-img");

const images = ["cara1.png", "cara2.png"];

let index = 0;
let flipped = false;

setInterval(() => {
  index = (index + 1) % images.length;
  img.src = images[index];

  flipped = !flipped;
  inner.style.transform = flipped ? "scaleX(-1)" : "scaleX(1)";
}, 500);
  
</script>

</body>
</html>
