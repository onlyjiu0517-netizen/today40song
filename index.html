<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 本日の一曲</title>

  <style>
    body{
      margin:0;
      background:#faf7ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:sans-serif;
      text-align:center;
    }

    .box{
      padding:40px;
    }

    h1{
      font-size:2.2em;
      margin-bottom:15px;
    }

    p{
      font-size:1.1em;
      color:#666;
      margin-bottom:30px;
    }

    button{
      font-size:1.2em;
      padding:15px 35px;
      border:none;
      border-radius:12px;
      cursor:pointer;
    }

    #loading{
      display:none;
      font-size:1.3em;
      margin-top:20px;
    }
  </style>
</head>

<body>

<div class="box">

<h1>🎵 本日の一曲 🎵</h1>

<p>ボタンを押して今日の一曲を聴こう！</p>

<button onclick="go()">🎲 今日の一曲を選ぶ</button>

<div id="loading">
選曲中... 🎵
</div>

</div>

<script>

const shorts = [
"https://youtube.com/shorts/77hRgNT0Hmo",
"https://youtube.com/shorts/RpKVfrWMneY",
"https://youtube.com/shorts/HkVHkRpf0fw",
"https://youtube.com/shorts/Qx-xw7kbkzo",
"https://youtube.com/shorts/EZw6ueP94u0"
];

function go(){

document.querySelector("button").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(()=>{

const random=Math.floor(Math.random()*shorts.length);

location.href=shorts[random];

},1000);

}

</script>

</body>
</html>
